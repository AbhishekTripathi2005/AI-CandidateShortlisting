<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentForge • AI Hiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        
        .card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.5); 
        }
        .tab-active {
            background-color: white;
            color: black;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- Improved Header -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-violet-600 rounded-2xl flex items-center justify-center text-3xl font-bold shadow-lg">TF</div>
            <div>
                <h1 class="text-4xl font-bold heading tracking-tighter">TalentForge</h1>
                <p class="text-zinc-400 text-sm -mt-1">AI Powered Candidate Shortlisting</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex items-center bg-zinc-900/80 backdrop-blur-md border border-zinc-700 rounded-3xl p-1.5">
            <button onclick="showTab(0)" id="tab0" 
                    class="tab-btn px-8 py-3 rounded-3xl font-medium transition-all">Candidates</button>
            <button onclick="showTab(1)" id="tab1" 
                    class="tab-btn px-8 py-3 rounded-3xl font-medium transition-all">Shortlist</button>
            <button onclick="showTab(2)" id="tab2" 
                    class="tab-btn px-8 py-3 rounded-3xl font-medium tab-active">AI Magic</button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="exportToCSV()" 
                    class="flex items-center gap-2 px-6 py-3 border border-zinc-700 hover:border-zinc-400 rounded-2xl text-sm font-medium">
                <i class="fas fa-download"></i> Export CSV
            </button>
            <button onclick="showAddModal()" 
                    class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl flex items-center gap-3 font-semibold transition-all">
                <i class="fas fa-plus"></i> Add Candidate
            </button>
        </div>
    </div>

    <!-- Tab 0: Candidates -->
    <div id="content0">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-semibold heading">All Candidates</h2>
            
            <div class="flex gap-4">
                <input id="search" type="text" placeholder="Search by name or skill..." 
                       onkeyup="filterCandidates()" 
                       class="bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-3 w-80 focus:outline-none focus:border-blue-500">
                
                <select id="sortFilter" onchange="filterCandidates()" 
                        class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none">
                    <option value="new">Newest First</option>
                    <option value="exp-high">Experience High to Low</option>
                    <option value="exp-low">Experience Low to High</option>
                </select>
            </div>
        </div>

        <div id="candidates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JS populated -->
        </div>
    </div>

    <!-- Tab 1: Basic Shortlist -->
    <div id="content1" class="hidden">
        <div class="max-w-2xl mx-auto bg-zinc-900 border border-zinc-800 rounded-3xl p-10">
            <h2 class="text-3xl font-semibold heading text-center mb-10">Job Requirement</h2>
            <div class="space-y-8">
                <div>
                    <label class="text-zinc-400 block mb-2">Required Skills</label>
                    <input id="reqSkills" type="text" placeholder="React, Node.js, MongoDB, Express" 
                           class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-zinc-400 block mb-2">Minimum Experience (years)</label>
                        <input id="minExp" type="number" value="1" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="text-zinc-400 block mb-2">Preferred Skills</label>
                        <input id="prefSkills" type="text" placeholder="AWS, Docker" 
                               class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                </div>
                <button onclick="basicShortlist()" 
                        class="w-full bg-white text-black py-5 rounded-2xl text-lg font-semibold hover:bg-zinc-100">
                    Run Basic Shortlist
                </button>
                <div id="basicResult" class="hidden mt-10"></div>
            </div>
        </div>
    </div>

    <!-- Tab 2: AI Magic -->
    <div id="content2" class="hidden">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-bold heading">AI Smart Shortlisting</h2>
                <p class="text-zinc-400 mt-2">Powered by OpenRouter</p>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-10">
                <input id="aiReqSkills" type="text" placeholder="Enter required skills (e.g. React, Node.js, Python)" 
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-lg mb-6">
                
                <button onclick="aiShortlist()" 
                        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 py-6 rounded-2xl text-xl font-semibold flex items-center justify-center gap-4 hover:brightness-110">
                    <i class="fas fa-robot"></i> Analyze with AI
                </button>

                <div id="aiResult" class="hidden mt-12"></div>
            </div>
        </div>
    </div>
</div>

<!-- Candidate Detail Modal -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-lg p-8">
        <h3 id="detail-name" class="text-3xl font-bold mb-1"></h3>
        <p id="detail-email" class="text-zinc-400 mb-6"></p>
        
        <div class="mb-6">
            <p class="text-zinc-400 text-sm mb-3">Skills</p>
            <div id="detail-skills" class="flex flex-wrap gap-2"></div>
        </div>
        
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div><span class="text-zinc-400">Experience:</span> <span id="detail-exp" class="font-semibold"></span> years</div>
            <div><span class="text-zinc-400">Added:</span> <span id="detail-date"></span></div>
        </div>
        
        <div class="flex gap-4">
            <button onclick="deleteCandidate()" class="flex-1 py-4 bg-red-600 hover:bg-red-700 rounded-2xl">Delete Candidate</button>
            <button onclick="closeDetailModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Close</button>
        </div>
    </div>
</div>

<!-- Add Candidate Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-md p-8">
        <h3 class="text-2xl font-semibold mb-6">Add New Candidate</h3>
        <div class="space-y-5">
            <input id="mName" placeholder="Full Name" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
            <input id="mEmail" placeholder="Email" type="email" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
            <input id="mSkills" placeholder="Skills (comma separated)" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
            <input id="mExp" type="number" value="2" placeholder="Experience in years" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
            <input id="mBio" placeholder="Bio / Designation (optional)" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4">
        </div>
        <div class="flex gap-4 mt-8">
            <button onclick="closeModal()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
            <button onclick="addCandidate()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-semibold">Add Candidate</button>
        </div>
    </div>
</div>

<script>
const API = "http://localhost:5000";
let candidates = [];
let currentCandidateId = null;

// Toast Notification
function showToast(msg, type = "success") {
    const toast = document.createElement("div");
    toast.className = `fixed bottom-8 right-8 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl z-[100] ${type === "success" ? "bg-emerald-600" : "bg-red-600"}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Load Candidates
async function loadCandidates() {
    try {
        const res = await fetch(`${API}/api/candidates`);
        candidates = await res.json();
        renderCandidates(candidates);
    } catch(e) {
        console.log("Backend not running");
    }
}

function renderCandidates(data) {
    const container = document.getElementById("candidates-grid");
    container.innerHTML = data.map(c => `
        <div onclick="showCandidateDetail('${c._id}')" 
             class="card bg-zinc-900 border border-zinc-800 rounded-3xl p-6 cursor-pointer">
            <div class="flex justify-between items-start">
                <div>
                    <h4 class="text-xl font-semibold">${c.name}</h4>
                    <p class="text-zinc-400 text-sm">${c.email}</p>
                </div>
                <div class="text-right">
                    <span class="text-4xl font-bold text-emerald-400">${c.experience}</span>
                    <span class="text-xs block -mt-1">yrs</span>
                </div>
            </div>
            <div class="mt-6 flex flex-wrap gap-2">
                ${c.skills.map(skill => `<span class="bg-zinc-800 text-xs px-4 py-1.5 rounded-full">${skill}</span>`).join('')}
            </div>
        </div>
    `).join('');
}

// Filter & Sort
function filterCandidates() {
    let filtered = [...candidates];
    const term = document.getElementById("search").value.toLowerCase();
    const sort = document.getElementById("sortFilter").value;

    if (term) {
        filtered = filtered.filter(c => 
            c.name.toLowerCase().includes(term) || 
            c.skills.some(s => s.toLowerCase().includes(term))
        );
    }

    if (sort === "exp-high") filtered.sort((a,b) => b.experience - a.experience);
    if (sort === "exp-low") filtered.sort((a,b) => a.experience - b.experience);

    renderCandidates(filtered);
}

// Candidate Detail
function showCandidateDetail(id) {
    const cand = candidates.find(c => c._id === id);
    if (!cand) return;

    currentCandidateId = id;
    document.getElementById("detail-name").textContent = cand.name;
    document.getElementById("detail-email").textContent = cand.email;
    document.getElementById("detail-exp").textContent = cand.experience;
    document.getElementById("detail-date").textContent = new Date(cand.createdAt).toLocaleDateString('en-IN');

    document.getElementById("detail-skills").innerHTML = cand.skills.map(s => 
        `<span class="bg-zinc-800 px-4 py-2 rounded-2xl text-sm">${s}</span>`
    ).join('');

    document.getElementById("detail-modal").classList.remove("hidden");
}

function closeDetailModal() {
    document.getElementById("detail-modal").classList.add("hidden");
}

async function deleteCandidate() {
    if (!currentCandidateId || !confirm("Delete this candidate permanently?")) return;
    
    await fetch(`${API}/api/candidates/${currentCandidateId}`, { method: "DELETE" });
    showToast("Candidate deleted successfully");
    closeDetailModal();
    loadCandidates();
}

// Add Candidate
async function addCandidate() {
    const name = document.getElementById("mName").value.trim();
    const email = document.getElementById("mEmail").value.trim();
    const skillsStr = document.getElementById("mSkills").value;
    const experience = parseInt(document.getElementById("mExp").value);
    const bio = document.getElementById("mBio").value.trim();

    if (!name || !email || !skillsStr) return alert("Name, Email and Skills are required");

    const skills = skillsStr.split(",").map(s => s.trim());

    await fetch(`${API}/api/candidates`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, skills, experience, bio })
    });

    closeModal();
    loadCandidates();
    showToast("Candidate added successfully!");
}

function showAddModal() {
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("mName").value = "";
    document.getElementById("mEmail").value = "";
    document.getElementById("mSkills").value = "";
    document.getElementById("mExp").value = "2";
    document.getElementById("mBio").value = "";
}

function closeModal() {
    document.getElementById("modal").classList.add("hidden");
}

// Export CSV
function exportToCSV() {
    if (candidates.length === 0) return alert("No candidates to export");
    
    let csv = "Name,Email,Skills,Experience,Bio,Added Date\n";
    candidates.forEach(c => {
        csv += `"${c.name}","${c.email}","${c.skills.join("; ")}",${c.experience},"${c.bio || ''}","${new Date(c.createdAt).toLocaleDateString()}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `candidates_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast("CSV Exported Successfully");
}

// Basic Shortlist
async function basicShortlist() {
    const requiredSkills = document.getElementById("reqSkills").value.split(",").map(s => s.trim());
    const minExp = parseInt(document.getElementById("minExp").value) || 0;

    const res = await fetch(`${API}/api/match`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ requiredSkills, minExperience: minExp })
    });
    const data = await res.json();

    let html = `<h3 class="font-semibold text-xl mb-6">Basic Shortlist Results</h3>`;
    data.forEach(c => {
        html += `
            <div class="bg-zinc-800 rounded-2xl p-5 mb-4 flex justify-between items-center">
                <div>
                    <div class="font-medium">${c.name}</div>
                    <div class="text-sm text-zinc-400">${c.experience} years</div>
                </div>
                <div class="text-4xl font-bold text-emerald-400">${c.matchScore}<span class="text-lg">%</span></div>
            </div>`;
    });
    document.getElementById("basicResult").innerHTML = html;
    document.getElementById("basicResult").classList.remove("hidden");
}

// AI Shortlist
async function aiShortlist() {
    const skills = document.getElementById("aiReqSkills").value.split(",").map(s => s.trim());
    if (!skills.length) return alert("Please enter skills");

    const loadingHTML = `
        <div class="text-center py-20">
            <div class="animate-spin w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-6 text-zinc-400">AI is analyzing candidates...</p>
        </div>`;
    
    document.getElementById("aiResult").innerHTML = loadingHTML;
    document.getElementById("aiResult").classList.remove("hidden");

    try {
        const res = await fetch(`${API}/api/ai/shortlist`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ requiredSkills: skills, minExperience: 1 })
        });
        const data = await res.json();

        let html = `<h3 class="text-2xl font-semibold mb-8">AI Ranked Candidates</h3>`;
        data.aiRanking.forEach(item => {
            html += `
                <div class="border border-zinc-700 rounded-3xl p-7 mb-6">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex items-center justify-center text-2xl font-bold">${item.rank}</div>
                        <div>
                            <div class="font-semibold text-xl">${item.name}</div>
                            <div class="text-emerald-400">${item.matchScore}% Match</div>
                        </div>
                    </div>
                    <p class="mt-5 text-zinc-300 leading-relaxed">${item.reason}</p>
                </div>`;
        });
        document.getElementById("aiResult").innerHTML = html;
    } catch(e) {
        document.getElementById("aiResult").innerHTML = `<p class="text-red-400 text-center py-12">AI request failed. Check OpenRouter API key.</p>`;
    }
}

// Tab Switch
function showTab(n) {
    document.querySelectorAll("[id^='content']").forEach(el => el.classList.add("hidden"));
    document.getElementById(`content${n}`).classList.remove("hidden");

    document.querySelectorAll(".tab-btn").forEach((btn, i) => {
        btn.classList.toggle("tab-active", i === n);
    });
}

// Initialize
window.onload = () => {
    loadCandidates();
    showTab(0);
};
</script>
</body>
</html>
